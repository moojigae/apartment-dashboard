<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 아파트 실거래가 대시보드</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js for charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #fffaf5; /* Very light orange tint background */
        }
        /* Custom Scrollbar for table */
        .table-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .table-container::-webkit-scrollbar-track {
            background: #fdf2e9; 
            border-radius: 4px;
        }
        .table-container::-webkit-scrollbar-thumb {
            background: #edbb99; 
            border-radius: 4px;
        }
        .table-container::-webkit-scrollbar-thumb:hover {
            background: #dc7633; 
        }
    </style>
</head>
<body class="p-4 md:p-8 text-gray-800">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header -->
        <div class="bg-white rounded-xl shadow-sm p-6 flex justify-between items-center border border-orange-100">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-gray-800 tracking-tight">
                    <i class="fa-solid fa-building text-orange-400 mr-2"></i>우리 동네 아파트 실거래가 대시보드
                </h1>
                <p class="text-gray-500 mt-2 text-sm" id="updateStatus">데이터를 불러오는 중입니다...</p>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="flex justify-center items-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500"></div>
        </div>

        <!-- Dashboard Content (Hidden initially) -->
        <div id="dashboardContent" class="hidden space-y-6">
            
            <!-- Summary Cards -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <!-- Total Count -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-orange-50 flex items-center">
                    <div class="p-3 rounded-full bg-orange-100 text-orange-600 mr-4">
                        <i class="fa-solid fa-file-contract text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 font-medium">전체 거래 건수</p>
                        <p class="text-2xl font-bold text-orange-700" id="totalCount">0<span class="text-base font-normal text-gray-600 ml-1">건</span></p>
                    </div>
                </div>

                <!-- Average Price -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-orange-50 flex items-center">
                    <div class="p-3 rounded-full bg-amber-100 text-amber-600 mr-4">
                        <i class="fa-solid fa-coins text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 font-medium">평균 거래가격</p>
                        <p class="text-2xl font-bold text-amber-700" id="avgPrice">0</p>
                    </div>
                </div>

                <!-- Highest Price -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-orange-50 flex items-center">
                    <div class="p-3 rounded-full bg-orange-200 text-orange-700 mr-4">
                        <i class="fa-solid fa-arrow-trend-up text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 font-medium">최고 거래가격</p>
                        <p class="text-2xl font-bold text-orange-800" id="maxPrice">0</p>
                    </div>
                </div>

                <!-- Lowest Price -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-orange-50 flex items-center">
                    <div class="p-3 rounded-full bg-yellow-100 text-yellow-600 mr-4">
                        <i class="fa-solid fa-arrow-trend-down text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 font-medium">최저 거래가격</p>
                        <p class="text-2xl font-bold text-yellow-700" id="minPrice">0</p>
                    </div>
                </div>
            </div>

            <!-- Chart Section -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold mb-4 text-gray-800">월별 평균 거래가격 추이</h2>
                <div class="relative h-[300px] w-full">
                    <canvas id="monthlyChart"></canvas>
                </div>
            </div>

            <!-- Table Section -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                    <h2 class="text-lg font-bold text-gray-800">최근 거래 목록</h2>
                    <span class="text-sm text-gray-500" id="tableSubtext"></span>
                </div>
                <div class="overflow-x-auto table-container max-h-[500px]">
                    <table class="w-full text-sm text-left text-gray-600">
                        <thead class="text-xs text-gray-700 uppercase bg-orange-50/50 sticky top-0 z-10 shadow-sm">
                            <tr>
                                <th scope="col" class="px-6 py-3 whitespace-nowrap">거래일자</th>
                                <th scope="col" class="px-6 py-3 whitespace-nowrap">아파트명</th>
                                <th scope="col" class="px-6 py-3 whitespace-nowrap">법정동</th>
                                <th scope="col" class="px-6 py-3 whitespace-nowrap">전용면적(㎡)</th>
                                <th scope="col" class="px-6 py-3 whitespace-nowrap text-center">층</th>
                                <th scope="col" class="px-6 py-3 whitespace-nowrap text-right">거래금액</th>
                                <th scope="col" class="px-6 py-3 whitespace-nowrap text-center">건축년도</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-gray-100">
                            <!-- Rows will be inserted here dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRFncyvBLnMjL6zgBYIvzYDMSY3PFUhOR7wHEctHxkVSTzYgrQCOz-rru62g9AytWxGQkEJ61H-POM_/pub?gid=531399458&single=true&output=csv';
        let chartInstance = null;

        // 1. 데이터 불러오기 및 파싱
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                if(data && data.length > 0) {
                    processData(data);
                } else {
                    showError("데이터가 비어있거나 불러올 수 없습니다.");
                }
            },
            error: function(err) {
                console.error(err);
                showError("데이터를 불러오는 중 오류가 발생했습니다.");
            }
        });

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('updateStatus').innerHTML = `<span class="text-red-500"><i class="fa-solid fa-triangle-exclamation"></i> ${msg}</span>`;
        }

        // 한국 통화 형식 변환기 (만원 단위 -> 억 만원)
        function formatKoreanCurrency(amountInManwon) {
            if (isNaN(amountInManwon) || amountInManwon === 0) return "-";
            
            if (amountInManwon >= 10000) {
                const uk = Math.floor(amountInManwon / 10000);
                const man = amountInManwon % 10000;
                if (man > 0) {
                    return `${uk}억 ${man.toLocaleString()}만원`;
                } else {
                    return `${uk}억원`;
                }
            }
            return `${amountInManwon.toLocaleString()}만원`;
        }

        // 2. 데이터 가공 및 분석
        function processData(rawData) {
            let totalCount = 0;
            let sumPrice = 0;
            let maxPrice = 0;
            let minPrice = Infinity;
            const monthlyDataMap = {};
            const cleanData = [];

            rawData.forEach(row => {
                const dateStr = row['거래일자'] || row['계약일'] || '';
                const aptName = row['아파트명'] || row['단지명'] || '';
                const dong = row['법정동'] || '';
                const area = row['전용면적(㎡)'] || row['전용면적(m^2)'] || row['전용면적'] || '';
                const floor = row['층'] || '';
                const buildYear = row['건축년도'] || '';
                
                const priceStr = row['거래금액(만원)'] || row['거래금액'] || '0';
                const price = parseInt(priceStr.replace(/,/g, '').trim(), 10);

                if (isNaN(price) || !dateStr || price === 0) return;

                let month = '기타';
                const dateMatch = dateStr.match(/(\d{4})[-. /]?(\d{1,2})/);
                if (dateMatch) {
                    const y = dateMatch[1];
                    const m = dateMatch[2].padStart(2, '0');
                    month = `${y}-${m}`;
                }

                totalCount++;
                sumPrice += price;
                if (price > maxPrice) maxPrice = price;
                if (price < minPrice) minPrice = price;

                if (!monthlyDataMap[month]) {
                    monthlyDataMap[month] = { sum: 0, count: 0 };
                }
                monthlyDataMap[month].sum += price;
                monthlyDataMap[month].count++;

                cleanData.push({
                    date: dateStr,
                    aptName, dong, area, floor, price, buildYear, sortDate: month
                });
            });

            if (minPrice === Infinity) minPrice = 0;
            const avgPrice = totalCount > 0 ? Math.round(sumPrice / totalCount) : 0;

            updateSummaryUI(totalCount, avgPrice, maxPrice, minPrice);
            
            const sortedMonths = Object.keys(monthlyDataMap).sort();
            const chartLabels = [];
            const chartData = [];
            
            sortedMonths.forEach(m => {
                chartLabels.push(m);
                chartData.push(Math.round(monthlyDataMap[m].sum / monthlyDataMap[m].count));
            });
            renderChart(chartLabels, chartData);

            cleanData.sort((a, b) => {
                let dateA = a.date.replace(/[^0-9]/g, '');
                let dateB = b.date.replace(/[^0-9]/g, '');
                return dateB.localeCompare(dateA);
            });
            renderTable(cleanData);

            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboardContent').classList.remove('hidden');
            document.getElementById('updateStatus').innerText = `총 ${totalCount.toLocaleString()}건의 데이터가 성공적으로 로드되었습니다.`;
        }

        // 3. 요약 카드 UI 업데이트
        function updateSummaryUI(count, avg, max, min) {
            document.getElementById('totalCount').innerHTML = `${count.toLocaleString()}<span class="text-base font-normal text-gray-600 ml-1">건</span>`;
            document.getElementById('avgPrice').innerText = formatKoreanCurrency(avg);
            document.getElementById('maxPrice').innerText = formatKoreanCurrency(max);
            document.getElementById('minPrice').innerText = formatKoreanCurrency(min);
        }

        // 4. 차트 렌더링 (Chart.js) - 초록 계열로 수정
        function renderChart(labels, data) {
            const ctx = document.getElementById('monthlyChart').getContext('2d');
            
            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '월 평균 거래금액 (만원)',
                        data: data,
                        borderColor: '#10b981', // Emerald-500 (Green)
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#10b981',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return formatKoreanCurrency(context.parsed.y);
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: {
                                color: '#f3f4f6',
                                drawBorder: false,
                            },
                            ticks: {
                                callback: function(value) {
                                    return (value / 10000).toFixed(1) + '억';
                                }
                            }
                        },
                        x: {
                            grid: {
                                display: false,
                                drawBorder: false,
                            }
                        }
                    },
                    interaction: {
                        intersect: false,
                        mode: 'index',
                    },
                }
            });
        }

        // 5. 테이블 렌더링
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            document.getElementById('tableSubtext').innerText = `최근 기준 (총 ${data.length.toLocaleString()}건)`;
            tbody.innerHTML = '';

            const fragment = document.createDocumentFragment();

            data.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-orange-50/50 transition-colors duration-150";
                
                if(index % 2 === 0) tr.classList.add('bg-white');
                else tr.classList.add('bg-orange-50/10');

                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-gray-500">${item.date}</td>
                    <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-800">${item.aptName}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-600">${item.dong}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-600">${item.area}㎡</td>
                    <td class="px-6 py-4 whitespace-nowrap text-center text-gray-600">${item.floor}층</td>
                    <td class="px-6 py-4 whitespace-nowrap text-right font-bold text-orange-600">${formatKoreanCurrency(item.price)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-center text-gray-500">${item.buildYear}</td>
                `;
                fragment.appendChild(tr);
            });

            tbody.appendChild(fragment);
        }
    </script>
</body>
</html>
