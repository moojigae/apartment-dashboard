<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 아파트 실거래가 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #fffaf5;
        }
        .table-container::-webkit-scrollbar { width: 8px; height: 8px; }
        .table-container::-webkit-scrollbar-track { background: #fdf2e9; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb { background: #edbb99; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #dc7633; }
        
        /* 랭킹 메달 색상 */
        .rank-1 { background-color: #FFD700; color: #fff; }
        .rank-2 { background-color: #C0C0C0; color: #fff; }
        .rank-3 { background-color: #CD7F32; color: #fff; }
    </style>
</head>
<body class="p-4 md:p-8 text-gray-800">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header & Filter -->
        <div class="bg-white rounded-xl shadow-sm p-6 flex flex-col md:flex-row justify-between items-start md:items-center border border-orange-100 gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-gray-800 tracking-tight">
                    <i class="fa-solid fa-building text-orange-400 mr-2"></i>우리 동네 아파트 실거래가 대시보드
                </h1>
                <p class="text-gray-500 mt-2 text-sm" id="updateStatus">데이터를 불러오는 중입니다...</p>
            </div>
            <!-- Dong Filter -->
            <div class="flex items-center gap-2 bg-orange-50 p-2 rounded-lg border border-orange-100">
                <label for="dongFilter" class="text-sm font-bold text-orange-700 whitespace-nowrap"><i class="fa-solid fa-location-dot mr-1"></i>동네 선택:</label>
                <select id="dongFilter" class="bg-white border border-orange-200 text-gray-700 text-sm rounded-md focus:ring-orange-500 focus:border-orange-500 block w-40 p-1.5 outline-none transition-all">
                    <option value="all">전체보기</option>
                </select>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="flex justify-center items-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500"></div>
        </div>

        <!-- Dashboard Content -->
        <div id="dashboardContent" class="hidden space-y-6">
            
            <!-- Summary Cards -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-orange-50 flex items-center">
                    <div class="p-3 rounded-full bg-orange-100 text-orange-600 mr-4">🏠</div>
                    <div>
                        <p class="text-sm text-gray-500 font-medium">전체 거래 건수</p>
                        <p class="text-2xl font-bold text-orange-700" id="totalCount">0</p>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-orange-50 flex items-center">
                    <div class="p-3 rounded-full bg-amber-100 text-amber-600 mr-4">💰</div>
                    <div>
                        <p class="text-sm text-gray-500 font-medium">평균 거래가격</p>
                        <p class="text-2xl font-bold text-amber-700" id="avgPrice">0</p>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-orange-50 flex items-center">
                    <div class="p-3 rounded-full bg-orange-200 text-orange-700 mr-4">📈</div>
                    <div>
                        <p class="text-sm text-gray-500 font-medium">최고 거래가격</p>
                        <p class="text-2xl font-bold text-orange-800" id="maxPrice">0</p>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-orange-50 flex items-center">
                    <div class="p-3 rounded-full bg-yellow-100 text-yellow-600 mr-4">📉</div>
                    <div>
                        <p class="text-sm text-gray-500 font-medium">최저 거래가격</p>
                        <p class="text-2xl font-bold text-yellow-700" id="minPrice">0</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Chart Section -->
                <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <h2 class="text-lg font-bold mb-4 text-gray-800"><i class="fa-solid fa-chart-line text-emerald-500 mr-2"></i>월별 평균 거래가격 추이</h2>
                    <div class="relative h-[300px] w-full">
                        <canvas id="monthlyChart"></canvas>
                    </div>
                </div>

                <!-- Ranking Section -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <h2 class="text-lg font-bold mb-4 text-gray-800"><i class="fa-solid fa-crown text-amber-400 mr-2"></i>동네 비싼 아파트 TOP 5</h2>
                    <div id="rankingList" class="space-y-3">
                        <!-- Ranking items dynamic -->
                    </div>
                </div>
            </div>

            <!-- Table Section -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-white">
                    <h2 class="text-lg font-bold text-gray-800"><i class="fa-solid fa-list mr-2 text-orange-400"></i>최근 거래 목록</h2>
                    <span class="text-sm text-gray-500" id="tableSubtext"></span>
                </div>
                <div class="overflow-x-auto table-container max-h-[600px]">
                    <table class="w-full text-sm text-left text-gray-600">
                        <thead class="text-xs text-gray-700 uppercase bg-orange-50 sticky top-0 z-10 shadow-sm">
                            <tr>
                                <th class="px-6 py-3">거래일자</th>
                                <th class="px-6 py-3">아파트명</th>
                                <th class="px-6 py-3">법정동</th>
                                <th class="px-6 py-3">면적(㎡)</th>
                                <th class="px-6 py-3 text-center">층</th>
                                <th class="px-6 py-3 text-right">거래금액</th>
                                <th class="px-6 py-3 text-center">건축년도</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-gray-100">
                            <!-- Table rows dynamic -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRFncyvBLnMjL6zgBYIvzYDMSY3PFUhOR7wHEctHxkVSTzYgrQCOz-rru62g9AytWxGQkEJ61H-POM_/pub?gid=531399458&single=true&output=csv';
        let chartInstance = null;
        let masterData = [];

        // 1. Data Initialization
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                if(results.data && results.data.length > 0) {
                    masterData = cleanRawData(results.data);
                    setupFilter(masterData);
                    updateDashboard('all');
                } else {
                    showError("데이터를 불러올 수 없습니다.");
                }
            },
            error: () => showError("네트워크 오류가 발생했습니다.")
        });

        function cleanRawData(rawData) {
            return rawData.map(row => {
                const dateStr = row['거래일자'] || row['계약일'] || '';
                const priceStr = row['거래금액(만원)'] || row['거래금액'] || '0';
                const price = parseInt(priceStr.replace(/,/g, '').trim(), 10);
                
                let month = '기타';
                const dateMatch = dateStr.match(/(\d{4})[-. /]?(\d{1,2})/);
                if (dateMatch) month = `${dateMatch[1]}-${dateMatch[2].padStart(2, '0')}`;

                return {
                    date: dateStr,
                    aptName: row['아파트명'] || row['단지명'] || '정보없음',
                    dong: (row['법정동'] || '기타').trim(),
                    area: row['전용면적(㎡)'] || row['전용면적'] || '0',
                    floor: row['층'] || '-',
                    price: price,
                    buildYear: row['건축년도'] || '-',
                    month: month
                };
            }).filter(d => d.price > 0 && d.date);
        }

        // 2. Filter Logic
        function setupFilter(data) {
            const filter = document.getElementById('dongFilter');
            const dongs = [...new Set(data.map(d => d.dong))].sort();
            
            dongs.forEach(dong => {
                const opt = document.createElement('option');
                opt.value = dong;
                opt.innerText = dong;
                filter.appendChild(opt);
            });

            filter.addEventListener('change', (e) => updateDashboard(e.target.value));
        }

        // 3. Update Dashboard Core
        function updateDashboard(selectedDong) {
            const filtered = selectedDong === 'all' 
                ? masterData 
                : masterData.filter(d => d.dong === selectedDong);

            if (filtered.length === 0) return;

            // Sort by date for list, by price for ranking
            const listData = [...filtered].sort((a,b) => b.date.localeCompare(a.date));
            const rankData = [...filtered].sort((a,b) => b.price - a.price).slice(0, 5);

            // Summary Stats
            const totalCount = filtered.length;
            const prices = filtered.map(d => d.price);
            const maxPrice = Math.max(...prices);
            const minPrice = Math.min(...prices);
            const avgPrice = Math.round(prices.reduce((a,b) => a+b, 0) / totalCount);

            // UI Refresh
            updateSummaryUI(totalCount, avgPrice, maxPrice, minPrice);
            renderChart(filtered);
            renderRanking(rankData);
            renderTable(listData);

            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboardContent').classList.remove('hidden');
            document.getElementById('updateStatus').innerText = `${selectedDong === 'all' ? '전체 동네' : selectedDong} 데이터 업데이트 완료`;
        }

        function formatKoreanCurrency(val) {
            if (val >= 10000) {
                const uk = Math.floor(val / 10000);
                const man = val % 10000;
                return man > 0 ? `${uk}억 ${man.toLocaleString()}만` : `${uk}억`;
            }
            return `${val.toLocaleString()}만`;
        }

        function updateSummaryUI(count, avg, max, min) {
            document.getElementById('totalCount').innerText = count.toLocaleString() + " 건";
            document.getElementById('avgPrice').innerText = formatKoreanCurrency(avg);
            document.getElementById('maxPrice').innerText = formatKoreanCurrency(max);
            document.getElementById('minPrice').innerText = formatKoreanCurrency(min);
        }

        function renderRanking(data) {
            const container = document.getElementById('rankingList');
            container.innerHTML = data.map((d, i) => `
                <div class="flex items-center p-3 rounded-lg border border-gray-50 hover:shadow-sm transition-shadow">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold mr-3 ${i<3 ? 'rank-'+(i+1) : 'bg-gray-100 text-gray-500'}">
                        ${i + 1}
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold text-gray-800 truncate">${d.aptName}</p>
                        <p class="text-xs text-gray-500">${d.area}㎡ · ${d.floor}층</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-bold text-orange-600">${formatKoreanCurrency(d.price)}</p>
                    </div>
                </div>
            `).join('');
        }

        function renderChart(data) {
            const monthlyMap = {};
            data.forEach(d => {
                if(!monthlyMap[d.month]) monthlyMap[d.month] = {sum: 0, count: 0};
                monthlyMap[d.month].sum += d.price;
                monthlyMap[d.month].count++;
            });

            const labels = Object.keys(monthlyMap).sort();
            const values = labels.map(l => Math.round(monthlyMap[l].sum / monthlyMap[l].count));

            const ctx = document.getElementById('monthlyChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.05)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { ticks: { callback: v => (v/10000).toFixed(1) + '억' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            document.getElementById('tableSubtext').innerText = `총 ${data.length.toLocaleString()}건`;
            
            tbody.innerHTML = data.map((item, index) => {
                const isExpensive = item.price >= 50000;
                const rowClass = index % 2 === 1 ? 'bg-orange-50/20' : 'bg-white';
                
                return `
                    <tr class="${rowClass} hover:bg-orange-100/40 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap text-gray-500">${item.date}</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-800">${item.aptName}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-gray-600">${item.dong}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-gray-600">${item.area}㎡</td>
                        <td class="px-6 py-4 whitespace-nowrap text-center text-gray-600">${item.floor}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-right font-bold ${isExpensive ? 'text-red-500' : 'text-orange-600'}">
                            ${formatKoreanCurrency(item.price)}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-center text-gray-500">${item.buildYear}</td>
                    </tr>
                `;
            }).join('');
        }

        function showError(msg) {
            document.getElementById('loading').innerHTML = `<div class="text-red-500 font-bold">${msg}</div>`;
        }
    </script>
</body>
</html>
